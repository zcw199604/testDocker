name: testdocker

services:
  postgres:
    image: postgres:16-alpine
    container_name: testdocker-postgres
    environment:
      POSTGRES_DB: bizdb
      POSTGRES_USER: bizuser
      POSTGRES_PASSWORD: bizpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizuser -d bizdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: testdocker-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  biz-service:
    image: testdocker-biz-service:latest
    build:
      context: ./biz-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bizdb
      SPRING_DATASOURCE_USERNAME: bizuser
      SPRING_DATASOURCE_PASSWORD: bizpass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_SQL_INIT_MODE: always
      AUTOSCALE_METRICS_WINDOW_DURATION: 15s
    expose:
      - "8080"
    labels:
      io.testdocker.autoscale.role: seed
      io.testdocker.autoscale.service-port: "8080"
      io.testdocker.autoscale.health-path: /api/health
      io.testdocker.autoscale.metrics-path: /api/autoscale/metrics
      io.testdocker.autoscale.upstream-name: biz_service_upstream
      io.testdocker.autoscale.seed-host: biz-service
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/api/health | grep '\"status\":\"UP\"' >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  ui-service:
    build:
      context: ./ui-service
    container_name: testdocker-ui-service-compose
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bizdb
      SPRING_DATASOURCE_USERNAME: bizuser
      SPRING_DATASOURCE_PASSWORD: bizpass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_SQL_INIT_MODE: always
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/ui-api/health | grep '\"status\":\"UP\"' >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: testdocker-nginx
    depends_on:
      biz-service:
        condition: service_healthy
      ui-service:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/generated:/etc/nginx/generated:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/nginx/health | grep 'ok' >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  autoscale-agent:
    image: testdocker-autoscale-agent:latest
    build:
      context: ./autoscale-agent
    depends_on:
      biz-service:
        condition: service_healthy
      nginx:
        condition: service_healthy
    restart: unless-stopped
    environment:
      AUTOSCALE_COMPOSE_FILE: /workspace/docker-compose.yml
      AUTOSCALE_GENERATED_DIR: /workspace/generated
      AUTOSCALE_TARGET_SERVICE: biz-service
      AUTOSCALE_NGINX_SERVICE: nginx
      AUTOSCALE_MIN_REPLICAS: "1"
      AUTOSCALE_MAX_REPLICAS: "4"
      AUTOSCALE_POLL_INTERVAL_SECONDS: "5"
      AUTOSCALE_SCALE_UP_WINDOW: "2"
      AUTOSCALE_SCALE_DOWN_WINDOW: "2"
      AUTOSCALE_COOLDOWN_SECONDS: "30"
      AUTOSCALE_DRAIN_SECONDS: "10"
      AUTOSCALE_STARTUP_TIMEOUT_SECONDS: "180"
      AUTOSCALE_HTTP_TIMEOUT_SECONDS: "2.5"
      AUTOSCALE_CPU_UP_THRESHOLD: "70"
      AUTOSCALE_CPU_DOWN_THRESHOLD: "25"
      AUTOSCALE_MEMORY_UP_THRESHOLD: "80"
      AUTOSCALE_MEMORY_DOWN_THRESHOLD: "35"
      AUTOSCALE_APP_METRIC_RULES: '[{"name":"requestRatePerSecond","up":0.2,"down":0.02,"aggregation":"max"},{"name":"inflightRequests","up":2,"down":0,"aggregation":"max"}]'
      AUTOSCALE_DRY_RUN: "false"
      AUTOSCALE_FAILURE_FREEZE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/workspace/docker-compose.yml:ro
      - ./nginx/generated:/workspace/generated

volumes:
  postgres_data:
  redis_data:
